<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Predictor</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body{
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container{
            width: 100%;
            max-width: 550px;
            background: #ffffff;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .title{
            text-align: center;
            color: #0f172a;
            margin-bottom: 10px;
        }

        .subtitle{
            text-align: center;
            color: #64748b;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group{
            margin-bottom: 18px;
        }

        label{
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #1e293b;
        }

        select,
        input{
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }

        select:focus,
        input:focus{
            border-color: #1e3a8a;
            box-shadow: 0 0 8px rgba(30,58,138,0.2);
        }

        .btn{
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: #1e3a8a;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover{
            background: #172554;
        }

        .result{
            margin-top: 25px;
            text-align: center;
            padding: 15px;
            border-radius: 8px;
            background: #eff6ff;
            color: #1e3a8a;
            font-size: 20px;
            font-weight: bold;
        }

        @media(max-width:600px){
            .container{
                padding: 25px;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <h1 class="title">Student Performance Predictor</h1>
        <p class="subtitle">
            Predict a student's Math Score using Machine Learning
        </p>

        <form action="{{ url_for('pred_datapoint') }}" method="POST">

            <div class="form-group">
                <label>Gender</label>
                <select name="gender" required>
                    <option selected disabled>Select Gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
            </div>

            <div class="form-group">
                <label>Race / Ethnicity</label>
                <select name="race_ethnicity" required>
                    <option selected disabled>Select Group</option>
                    <option value="group A">Group A</option>
                    <option value="group B">Group B</option>
                    <option value="group C">Group C</option>
                    <option value="group D">Group D</option>
                    <option value="group E">Group E</option>
                </select>
            </div>

            <div class="form-group">
                <label>Parental Level of Education</label>
                <select name="parental_level_of_education" required>
                    <option selected disabled>Select Education Level</option>
                    <option value="some high school">Some High School</option>
                    <option value="high school">High School</option>
                    <option value="some college">Some College</option>
                    <option value="associate's degree">Associate's Degree</option>
                    <option value="bachelor's degree">Bachelor's Degree</option>
                    <option value="master's degree">Master's Degree</option>
                </select>
            </div>

            <div class="form-group">
                <label>Lunch</label>
                <select name="lunch" required>
                    <option selected disabled>Select Lunch Type</option>
                    <option value="standard">Standard</option>
                    <option value="free/reduced">Free / Reduced</option>
                </select>
            </div>

            <div class="form-group">
                <label>Test Preparation Course</label>
                <select name="test_preparation_course" required>
                    <option selected disabled>Select Option</option>
                    <option value="completed">Completed</option>
                    <option value="none">None</option>
                </select>
            </div>

            <div class="form-group">
                <label>Reading Score</label>
                <input type="number"
                       name="reading_score"
                       min="0"
                       max="100"
                       placeholder="Enter Reading Score"
                       required>
            </div>

            <div class="form-group">
                <label>Writing Score</label>
                <input type="number"
                       name="writing_score"
                       min="0"
                       max="100"
                       placeholder="Enter Writing Score"
                       required>
            </div>

            <button type="submit" class="btn">
                Predict Math Score
            </button>

        </form>

    <!-- This is important since we using two different requests [GET, POST]-->

        {% if results %}
        <div class="result">
            Predicted Math Score: {{ results }}
        </div>
        {% endif %}

    </div>

</body>
</html>
